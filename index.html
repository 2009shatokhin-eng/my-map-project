<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BANZAI CRM 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005cc5">
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=50b1a67c-b3e5-433f-a378-4f8ff228e7d7&lang=ru_RU" type="text/javascript"></script>
    <style>
        :root { --panel-h: 70px; --accent: #005cc5; --red: #ff0000; --green: #28a745; --blue: #007bff; --gray: #777; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .ui-top { height: var(--panel-h); display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 10px; background: #111; box-sizing: border-box; border-bottom: 1px solid #333; position: relative; z-index: 10; }
        #map { width: 100vw; height: calc(100vh - var(--panel-h)); position: absolute; top: var(--panel-h); }
        button { height: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .active-btn { background: var(--accent) !important; border-color: #fff; }
        
        /* Стили для активных кнопок в балуне */
        .btn-active-state { border: 2px solid white !important; opacity: 1 !important; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-inactive-state { opacity: 0.5; border: 1px solid #444; }

        .task-counter { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; font-size: 10px; color: #aaa; }
        .task-counter b { font-size: 16px; color: #00ff00; }
        
        #menu { 
            position: fixed; right: -300px; top: 0; width: 280px; height: 100%; 
            background: #1a1a1a; z-index: 2000; transition: 0.3s; padding: 20px; 
            box-shadow: -10px 0 20px rgba(0,0,0,0.7); overflow-y: auto; 
            box-sizing: border-box; border-left: 1px solid #333; 
        }
        #menu.open { right: 0; }
        .close-menu { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #777; cursor: pointer; padding: 5px; }
        
        .day-box { margin-bottom: 8px; border: 1px solid #333; border-radius: 5px; }
        .day-header { padding: 12px; background: #252525; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .day-header.viewing { border: 1px solid var(--blue); background: #002b5c; }
        .day-content { padding: 10px; background: #111; display: none; font-size: 11px; color: #aaa; }
        .v-group { margin-bottom: 10px; }
        .v-group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .v-link { display: inline-block; padding: 5px 8px; margin: 2px; background: #333; border-radius: 4px; color: #fff; cursor: pointer; }
        .v-link.v-open { border-left: 3px solid var(--blue); }
        .v-link.v-close { border-left: 3px solid var(--red); }
        .btn-reset-filter { width: 100%; height: 40px; margin-bottom: 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 11px; font-weight: bold; }

        #notePanel {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #1a1a1a;
            border-top: 2px solid var(--accent); padding: 15px; box-sizing: border-box;
            transition: bottom 0.3s ease; z-index: 3000; max-height: 45vh; overflow-y: auto;
        }
        #notePanel.open { bottom: 0; }
        .note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .note-input { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; resize: vertical; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-save { flex: 1; height: 45px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; }
        .btn-cancel { flex: 1; height: 45px; background: #444; color: #fff; border: none; border-radius: 6px; font-size: 15px; }

        .menu-bottom-btn { width: 100%; height: 50px; margin-top: 20px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 15px; font-weight: bold; }
        
        .note-card { background: #222; padding: 10px; border-radius: 6px; margin-bottom: 8px; position: relative; font-size: 12px; border-left: 3px solid var(--accent); }
        .del-note { position: absolute; top: 5px; right: 8px; color: #666; cursor: pointer; }
    </style>
</head>
<body>

<div class="ui-top">
    <button id="gpsBtn" onclick="toggleGPS()">🛰 GPS: ВЫКЛ</button>
    <button id="tmrBtn" onclick="toggleTomorrowManually()">ЗАВТРА</button>
    <div class="task-counter">ЗАДАЧИ<b id="taskCountVal">0</b></div>
    <button onclick="toggleMenu()" style="position:relative">☰ <div id="menuBadge" style="position:absolute; top:2px; right:2px; width:8px; height:8px; background:red; border-radius:50%; display:none;"></div></button>
</div>

<div id="map"></div>

<div id="menu">
    <div class="close-menu" onclick="toggleMenu()">✕</div>
    <h3 style="margin: 0 0 15px 0; font-size:16px; color: #ccc;">ГРАФИК ОБХОДА</h3>
    <button id="allVentilsBtn" onclick="toggleAllVentils()" class="btn-reset-filter">ВСЕ ВЕНТИЛИ</button>
    <button onclick="closeDayView()" id="resetFilterBtn" class="btn-reset-filter" style="display:none;">СБРОСИТЬ ФИЛЬТР ДНЯ</button>
    <div id="daysList"></div>
    <h4 style="margin: 25px 0 10px 0; font-size: 14px; color: #888;">ЗАМЕТКИ</h4>
    <div id="notesList"></div>
    <button onclick="toggleMenu()" class="menu-bottom-btn">ЗАКРЫТЬ МЕНЮ</button>
</div>

<div id="notePanel">
    <div class="note-header">
        <strong id="notePanelTitle">Вентиль V00</strong>
        <span onclick="closeNotePanel()" style="font-size:24px; cursor:pointer; color:#777;">✕</span>
    </div>
    <textarea id="noteTextarea" class="note-input" placeholder="Введите заметку..."></textarea>
    <div class="btn-row">
        <button class="btn-save" onclick="saveNoteFromPanel()">СОХРАНИТЬ</button>
        <button class="btn-cancel" onclick="closeNotePanel()">ОТМЕНА</button>
    </div>
</div>

<script>
    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Active"));
    }

    const sched = {
        0:[3,5,6,8,13,14,16,17,20,28], 1:[3,5,6,8,13,14,16,18,28,29], 
        2:[4,5,6,8,13,14,18,28], 3:[3,5,6,8,13,14,16,19,21,22,23,28], 
        4:[3,5,6,8,13,14,16,20,28], 5:[13,14,16,17,28], 
        6:[3,4,5,6,8,13,14,16,18,19,21,22,23,28,29]
    };

    const points = [
        ["V",1,57.153616,60.012377], ["V",3,57.153763,60.011196], ["V",4,57.153790,60.010685],
        ["V",5,57.153861,60.009856], ["V",6,57.153787,60.009456], ["V",7,57.153856,60.009429],
        ["V",8,57.153911,60.010000], ["V",13,57.155365,60.010686], ["V",14,57.156000,60.011000],
        ["V",16,57.157449,60.012556], ["V",17,57.157517,60.012605], ["V",18,57.157711,60.011420],
        ["V",19,57.157770,60.011307], ["V",20,57.157847,60.011664], ["V",21,57.158330,60.011053],
        ["V",22,57.158810,60.010756], ["V",23,57.159430,60.010554], ["V",28,57.163021,60.009219],
        ["V",29,57.163093,60.009371]
    ];

    let myMap, watchId, myPosMarker;
    let isTmr = false, manualTmrOverride = false, selectedDay = null;
    let showAllVentils = false;
    let currentEditingId = null;

    let states = JSON.parse(localStorage.getItem('banzai_v19_s') || '{}');
    let notes = JSON.parse(localStorage.getItem('banzai_v19_n') || '{}');
    let pointObjects = {};

    ymaps.ready(() => {
        myMap = new ymaps.Map("map", { center: [57.1580, 60.0110], zoom: 16, type: 'yandex#hybrid', controls: [] });
        checkAutoTime();
        render();
    });

    function checkAutoTime() {
        if (!manualTmrOverride) { isTmr = (new Date().getHours() >= 19); updateTmrButtonUI(); }
    }

    function getDateKey() {
        const d = new Date();
        if (isTmr) d.setDate(d.getDate() + 1);
        return d.toISOString().split('T')[0];
    }

    function render() {
        myMap.geoObjects.removeAll();
        if (myPosMarker) myMap.geoObjects.add(myPosMarker);

        pointObjects = {};
        const dateKey = getDateKey();
        const now = new Date();
        if (isTmr) now.setDate(now.getDate() + 1);
        
        const curIdx = now.getDay();
        const prevIdx = (curIdx - 1 + 7) % 7;
        let count = 0;

        points.forEach(p => {
            const id = p[1], fullId = p[0] + id;
            const currentState = states[dateKey + '_' + fullId];
            const isDone = currentState === 1;
            const isUndone = currentState === 0;
            
            let color = null;
            let opacity = 1;

            if (selectedDay !== null) {
                const sPrevIdx = (selectedDay - 1 + 7) % 7;
                const inSelected = (sched[selectedDay] || []).includes(id);
                const inPrev = (sched[sPrevIdx] || []).includes(id);
                if (inSelected && !inPrev) color = '#007bff';
                else if (!inSelected && inPrev) color = '#ff0000';
                else { color = inSelected ? '#ffffff' : '#333333'; opacity = 0.4; }
            } else {
                const planCurrent = sched[curIdx] || [];
                const planPrevious = sched[prevIdx] || [];
                const inToday = planCurrent.includes(id);
                const inYesterday = planPrevious.includes(id);

                if (showAllVentils || (inToday || inYesterday)) {
                    if (inToday && !inYesterday) {
                        color = isDone ? '#28a745' : '#007bff';
                        if(!isDone && !showAllVentils) count++;
                    }
                    else if (!inToday && inYesterday) {
                        color = isDone ? '#28a745' : '#ff0000';
                        if(!isDone && !showAllVentils) count++;
                    }
                    else if (showAllVentils) { color = '#666666'; opacity = 0.45; }
                }
            }

            if (color) {
                const placemark = new ymaps.Placemark([p[2], p[3]], {
                    balloonContent: `
                        <div class="balloon-content" style="min-width:180px; color:#333;">
                            <b style="font-size:16px;">Вентиль V${id}</b><br><br>
                            <div class="btn-row" style="display:flex; gap:6px; margin:8px 0;">
                                <button class="${isDone ? 'btn-active-state' : 'btn-inactive-state'}" onclick="saveData('${fullId}', 1)" style="flex:1; background:#28a745; height:40px;">ГОТОВО</button>
                                <button class="${isUndone ? 'btn-active-state' : 'btn-inactive-state'}" onclick="saveData('${fullId}', 0)" style="flex:1; background:#777; color:#fff; height:40px;">ОТМЕНА</button>
                            </div>
                            <button onclick="openNotePanel('${fullId}')" style="width:100%; padding:10px; background:#005cc5; color:white; border:none; border-radius:4px; font-weight:bold; margin-top:6px;">
                                РЕДАКТИРОВАТЬ ЗАМЕТКУ
                            </button>
                        </div>`
                }, { preset: 'islands#dotIcon', iconColor: color, balloonAutoPan: true, opacity: opacity });

                myMap.geoObjects.add(placemark);
                pointObjects[id] = placemark;
            }
        });

        document.getElementById('taskCountVal').innerText = count;
        document.getElementById('resetFilterBtn').style.display = (selectedDay !== null) ? 'block' : 'none';
        updateMenu();
    }

    function saveData(id, status) {
        states[getDateKey() + '_' + id] = status;
        localStorage.setItem('banzai_v19_s', JSON.stringify(states));
        myMap.balloon.close();
        render();
    }

    function openNotePanel(fullId) {
        currentEditingId = fullId;
        document.getElementById('notePanelTitle').innerText = `Вентиль ${fullId}`;
        document.getElementById('noteTextarea').value = notes[fullId] || '';
        document.getElementById('notePanel').classList.add('open');
        setTimeout(() => document.getElementById('noteTextarea').focus(), 300);
    }

    function closeNotePanel() { document.getElementById('notePanel').classList.remove('open'); currentEditingId = null; }

    function saveNoteFromPanel() {
        if (!currentEditingId) return;
        notes[currentEditingId] = document.getElementById('noteTextarea').value.trim();
        localStorage.setItem('banzai_v19_n', JSON.stringify(notes));
        closeNotePanel();
        render();
    }

    function toggleGPS() {
        const btn = document.getElementById('gpsBtn');
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null; btn.classList.remove('active-btn'); btn.innerText = "🛰 GPS: ВЫКЛ";
        } else {
            btn.classList.add('active-btn'); btn.innerText = "🛰 GPS: ...";
            watchId = navigator.geolocation.watchPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                btn.innerText = `🛰 ${Math.round(pos.coords.accuracy)}м`;
                if (!myPosMarker) {
                    myPosMarker = new ymaps.Placemark(c, {}, { preset: 'islands#personIcon', iconColor: '#ff0000' });
                    myMap.geoObjects.add(myPosMarker);
                } else { myPosMarker.geometry.setCoordinates(c); }
                if (!myPosMarker._centered) { myMap.setCenter(c, 17, {duration: 400}); myPosMarker._centered = true; }
            }, null, {enableHighAccuracy: true});
        }
    }

    function toggleAllVentils() {
        showAllVentils = !showAllVentils;
        document.getElementById('allVentilsBtn').innerText = showAllVentils ? "ТОЛЬКО ЗАДАЧИ" : "ВСЕ ВЕНТИЛИ";
        render();
    }

    function updateMenu() {
        const days = ["ВОСКРЕСЕНЬЕ","ПОНЕДЕЛЬНИК","ВТОРНИК","СРЕДА","ЧЕТВЕРГ","ПЯТНИЦА","СУББОТА"];
        let h = '';
        days.forEach((name, i) => {
            const isSelected = selectedDay === i;
            const prev = (i - 1 + 7) % 7;
            const toOpen = sched[i].filter(v => !sched[prev].includes(v));
            const toClose = sched[prev].filter(v => !sched[i].includes(v));
            h += `<div class="day-box"><div class="day-header ${isSelected ? 'viewing' : ''}" onclick="selectDay(${i})">
                  <span>${name}</span> <span>${toOpen.length + toClose.length} задач</span></div>
                  <div class="day-content" style="display: ${isSelected ? 'block' : 'none'}">
                    <div class="v-group"><span class="v-group-title" style="color:var(--blue)">Открыть:</span>
                    ${toOpen.map(v => `<span class="v-link v-open" onclick="focusV(${v})">V${v}</span>`).join('')}</div>
                    <div class="v-group"><span class="v-group-title" style="color:var(--red)">Закрыть:</span>
                    ${toClose.map(v => `<span class="v-link v-close" onclick="focusV(${v})">V${v}</span>`).join('')}</div>
                  </div></div>`;
        });
        document.getElementById('daysList').innerHTML = h;

        let nh = '', nc = 0;
        for (let id in notes) { 
            if (notes[id]) { 
                nc++; 
                const numId = id.replace(/\D/g,'');
                nh += `<div class="note-card" onclick="focusV(${numId}); openNotePanel('${id}')">
                    <span class="del-note" onclick="event.stopPropagation(); deleteNote('${id}')">✕</span>
                    <b>${id}:</b> ${notes[id]}
                </div>`; 
            } 
        }
        document.getElementById('notesList').innerHTML = nh || '<div style="color:#444">Заметок нет</div>';
        document.getElementById('menuBadge').style.display = nc > 0 ? 'block' : 'none';
    }

    function focusV(id) {
        if (!pointObjects[id]) { selectedDay = null; render(); }
        setTimeout(() => {
            if (pointObjects[id]) {
                const coords = pointObjects[id].geometry.getCoordinates();
                myMap.setCenter(coords, 18, {duration: 300});
                pointObjects[id].balloon.open();
                if (window.innerWidth < 600) document.getElementById('menu').classList.remove('open');
            }
        }, 150);
    }

    function deleteNote(id) {
        notes[id] = ""; localStorage.setItem('banzai_v19_n', JSON.stringify(notes)); updateMenu(); render();
    }

    function toggleTomorrowManually() { manualTmrOverride = true; isTmr = !isTmr; selectedDay = null; updateTmrButtonUI(); render(); }
    function updateTmrButtonUI() { document.getElementById('tmrBtn').classList.toggle('active-btn', isTmr); }
    function selectDay(idx) { selectedDay = (selectedDay === idx) ? null : idx; render(); }
    function closeDayView() { selectedDay = null; render(); }
    function toggleMenu() { document.getElementById('menu').classList.toggle('open'); }
</script>
</body>
</html>
