<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BANZAI CRM PRO v2026</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=50b1a67c-b3e5-433f-a378-4f8ff228e7d7&lang=ru_RU" type="text/javascript"></script>
    <style>
        :root { --panel-h: 70px; --accent: #005cc5; --red: #ff0000; --green: #28a745; --blue: #007bff; --gray: #777; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Верхняя панель */
        .ui-top { height: var(--panel-h); display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 10px; background: #111; box-sizing: border-box; border-bottom: 1px solid #333; position: relative; z-index: 10; }
        #map { width: 100vw; height: calc(100vh - var(--panel-h)); position: absolute; top: var(--panel-h); }

        button { height: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .active-btn { background: var(--accent) !important; border-color: #fff; }
        
        .task-counter { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; font-size: 10px; color: #aaa; }
        .task-counter b { font-size: 16px; color: #00ff00; }

        /* Меню ("Бутерброд") */
        #menu { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: #1a1a1a; z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.7); overflow-y: auto; box-sizing: border-box; border-left: 1px solid #333; }
        #menu.open { right: 0; }
        .close-menu { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #777; cursor: pointer; padding: 5px; line-height: 1; }
        
        .badge { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
        
        .day-box { margin-bottom: 8px; border: 1px solid #333; border-radius: 5px; }
        .day-header { padding: 12px; background: #252525; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .day-header.viewing { border: 1px solid var(--blue); background: #002b5c; }
        .day-content { padding: 10px; background: #111; display: none; font-size: 12px; color: #aaa; }
        .v-link { display: inline-block; padding: 6px 10px; margin: 3px; background: #333; border-radius: 4px; color: #fff; cursor: pointer; }

        /* Кнопка сброса фильтра в общем стиле */
        .btn-reset-filter { width: 100%; height: 40px; margin-bottom: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .sync-footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; text-align: center; }

        .note-card { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; border-left: 3px solid var(--accent); cursor: pointer; }
        .note-card:active { background: #444; }
        .del-note { color: var(--red); float: right; cursor: pointer; font-weight: bold; padding: 0 5px; }

        /* Балун */
        .balloon-content { color: #000; min-width: 180px; padding: 5px; }
        .note-input { width: 100%; height: 65px; margin: 8px 0; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn-done { width: 100%; height: 45px; background: var(--green); color: #fff; border: none; border-radius: 4px; font-weight: bold; margin-bottom: 6px; }
        .btn-undo { width: 100%; height: 35px; background: #f0f0f0; border: 1px solid #ccc; color: #333; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div class="ui-top">
    <button id="gpsBtn" onclick="toggleGPS()">🛰 GPS: ВЫКЛ</button>
    <button id="tmrBtn" onclick="toggleTomorrow()">ЗАВТРА</button>
    <div class="task-counter">ЗАДАЧИ<b id="taskCountVal">0</b></div>
    <button onclick="toggleMenu()" style="position:relative">☰ <div id="menuBadge" class="badge"></div></button>
</div>

<div id="map"></div>

<div id="menu">
    <div class="close-menu" onclick="toggleMenu()">✕</div>
    <h3 style="margin: 0 0 20px 0; font-size:16px; color: #ccc;">ГРАФИК ОБХОДА</h3>
    
    <button onclick="closeDayView()" id="resetFilterBtn" class="btn-reset-filter" style="display:none;">СБРОСИТЬ ФИЛЬТР ДНЯ</button>
    
    <div id="daysList"></div>
    
    <h4 style="margin: 25px 0 10px 0; font-size: 14px; color: #888;">ЗАМЕТКИ</h4>
    <div id="notesList"></div>

    <div class="sync-footer">
        <button onclick="manualSync()" style="width: 100%; height: 40px; background: #222; border: 1px solid #444; color: #777;">СИНХРОНИЗАЦИЯ С ОБЛАКОМ</button>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycby5P8fV0N9L-qJ7B6E4qK9pWp_XvLz0S0uYf_Z4z7Yf_Z4z7Yf_Z4z7Yf/exec';
    
    const sched = {
        0:[3,5,6,8,13,14,16,17,20,28], 1:[3,5,6,8,13,14,16,18,28,29], 
        2:[4,5,6,8,13,14,18,28], 3:[3,5,6,8,13,14,16,19,21,22,23,28], 
        4:[3,5,6,8,13,14,16,20,28], 5:[13,14,16,17,28], 
        6:[3,4,5,6,8,13,14,16,18,19,21,22,23,28,29]
    };

    const points = [
        ["V", 1, 57.153616, 60.012377], ["V", 3, 57.153763, 60.011196], ["V", 4, 57.153790, 60.010685],
        ["V", 5, 57.153861, 60.009856], ["V", 6, 57.153787, 60.009456], ["V", 7, 57.153856, 60.009429],
        ["V", 8, 57.153911, 60.010000], ["V", 13, 57.155365, 60.010686], ["V", 14, 57.156000, 60.011000],
        ["V", 16, 57.157449, 60.012556], ["V", 17, 57.157517, 60.012605], ["V", 18, 57.157711, 60.011420],
        ["V", 19, 57.157770, 60.011307], ["V", 20, 57.157847, 60.011664], ["V", 21, 57.158330, 60.011053],
        ["V", 22, 57.158810, 60.010756], ["V", 23, 57.159430, 60.010554], ["V", 28, 57.163021, 60.009219],
        ["V", 29, 57.163093, 60.009371]
    ];

    let myMap, watchId, myPosMarker;
    let isTmr = false;
    let selectedDay = null; 
    let states = JSON.parse(localStorage.getItem('banzai_v18_s') || '{}');
    let notes = JSON.parse(localStorage.getItem('banzai_v18_n') || '{}');
    let pointObjects = {};

    ymaps.ready(() => {
        myMap = new ymaps.Map("map", { center: [57.1580, 60.0110], zoom: 16, type: 'yandex#hybrid', controls: [] });
        checkAutoClosure();
        render();
    });

    function checkAutoClosure() {
        const now = new Date();
        const lastCheck = localStorage.getItem('banzai_last_check') || "";
        const todayStr = now.toDateString();
        if (now.getHours() >= 19 || lastCheck !== todayStr) {
            const dayToClose = (now.getHours() < 19) ? (now.getDay() - 1 + 7) % 7 : now.getDay();
            (sched[dayToClose] || []).forEach(id => { if (!states['V'+id]) states['V'+id] = 1; });
            localStorage.setItem('banzai_v18_s', JSON.stringify(states));
            localStorage.setItem('banzai_last_check', todayStr);
        }
    }

    function render() {
        myMap.geoObjects.removeAll();
        pointObjects = {};
        const now = new Date();
        if (isTmr) now.setDate(now.getDate() + 1);
        
        const curIdx = now.getDay();
        const prevIdx = (curIdx - 1 + 7) % 7;
        
        const planToday = sched[curIdx] || [];
        const planYesterday = sched[prevIdx] || [];
        
        let count = 0;

        points.forEach(p => {
            const id = p[1];
            const fullId = p[0] + id;
            const inToday = planToday.includes(id);
            const inYesterday = planYesterday.includes(id);
            const isDone = states[fullId] === 1;

            let visible = false;
            let color = '#777'; 

            if (selectedDay !== null) {
                visible = sched[selectedDay].includes(id);
                color = isDone ? '#28a745' : '#007bff';
            } else {
                if (inToday && !inYesterday) { visible = true; color = isDone ? '#28a745' : '#007bff'; if(!isDone) count++; } 
                else if (!inToday && inYesterday) { visible = true; color = isDone ? '#28a745' : '#ff0000'; if(!isDone) count++; } 
                else if (inToday && inYesterday) { visible = true; color = isDone ? '#28a745' : '#777777'; } 
            }

            if (visible) {
                const placemark = new ymaps.Placemark([p[2], p[3]], {
                    balloonContent: `
                        <div class="balloon-content">
                            <b>Точка V${id}</b>
                            <textarea class="note-input" id="ni_${fullId}">${notes[fullId] || ''}</textarea>
                            <button class="btn-done" onclick="saveData('${fullId}', 1)">ГОТОВО</button>
                            <button class="btn-undo" onclick="saveData('${fullId}', 0)">ОТМЕНА (В РАБОТУ)</button>
                        </div>`
                }, { preset: 'islands#dotIcon', iconColor: color });
                myMap.geoObjects.add(placemark);
                pointObjects[id] = placemark;
            }
        });

        document.getElementById('taskCountVal').innerText = count;
        document.getElementById('resetFilterBtn').style.display = (selectedDay !== null) ? 'block' : 'none';
        updateMenu();
    }

    function saveData(id, status) {
        notes[id] = document.getElementById('ni_'+id).value;
        states[id] = status;
        localStorage.setItem('banzai_v18_s', JSON.stringify(states));
        localStorage.setItem('banzai_v18_n', JSON.stringify(notes));
        myMap.balloon.close();
        render();
        sendToCloud();
    }

    function updateMenu() {
        const days = ["ВОСКРЕСЕНЬЕ","ПОНЕДЕЛЬНИК","ВТОРНИК","СРЕДА","ЧЕТВЕРГ","ПЯТНИЦА","СУББОТА"];
        let h = '';
        days.forEach((name, i) => {
            const isSelected = selectedDay === i;
            h += `<div class="day-box">
                <div class="day-header ${isSelected ? 'viewing' : ''}" onclick="selectDay(${i})">
                    <span>${name}</span> <span>${sched[i].length} V</span>
                </div>
                <div class="day-content" style="display: ${isSelected ? 'block' : 'none'}">
                    ${sched[i].map(v => `<span class="v-link" onclick="focusV(${v})">V${v}</span>`).join('')}
                </div>
            </div>`;
        });
        document.getElementById('daysList').innerHTML = h;
        
        let nh = '', nc = 0;
        for (let id in notes) { 
            if (notes[id]) { 
                nc++; 
                const numId = id.replace(/\D/g,'');
                nh += `<div class="note-card" onclick="focusV(${numId})">
                        <span class="del-note" onclick="event.stopPropagation(); deleteNote('${id}')">✕</span>
                        <b>${id}:</b> ${notes[id]}
                       </div>`; 
            } 
        }
        document.getElementById('notesList').innerHTML = nh || '<div style="color:#444">Заметок нет</div>';
        document.getElementById('menuBadge').style.display = nc > 0 ? 'block' : 'none';
    }

    function selectDay(idx) { selectedDay = (selectedDay === idx) ? null : idx; render(); }
    function closeDayView() { selectedDay = null; render(); }
    
    function focusV(id) {
        if (!pointObjects[id]) {
            selectedDay = null;
            render();
        }
        setTimeout(() => {
            if (pointObjects[id]) {
                const coords = pointObjects[id].geometry.getCoordinates();
                myMap.setCenter(coords, 18, {duration: 300});
                pointObjects[id].balloon.open();
                if (window.innerWidth < 600) toggleMenu();
            }
        }, 100);
    }

    function deleteNote(id) { notes[id] = ""; localStorage.setItem('banzai_v18_n', JSON.stringify(notes)); updateMenu(); render(); }
    function toggleTomorrow() { isTmr = !isTmr; selectedDay = null; document.getElementById('tmrBtn').classList.toggle('active-btn', isTmr); render(); }

    function toggleGPS() {
        const btn = document.getElementById('gpsBtn');
        if (watchId) {
            navigator.geolocation.clearWatch(watchId); watchId = null; 
            btn.classList.remove('active-btn'); btn.innerText = "🛰 GPS: ВЫКЛ";
            if (myPosMarker) myMap.geoObjects.remove(myPosMarker);
        } else {
            btn.classList.add('active-btn');
            watchId = navigator.geolocation.watchPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                const acc = Math.round(pos.coords.accuracy);
                btn.innerText = `🛰 ${acc}м`;
                if (!myPosMarker) {
                    myPosMarker = new ymaps.Placemark(c, {}, {preset: 'islands#personIcon', iconColor: '#ff0000'});
                    myMap.geoObjects.add(myPosMarker);
                } else { myPosMarker.geometry.setCoordinates(c); }
                if (acc < 30) myMap.setCenter(c);
            }, null, {enableHighAccuracy: true});
        }
    }

    function toggleMenu() { document.getElementById('menu').classList.toggle('open'); }
    async function sendToCloud() { try { fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({states, notes}) }); } catch(e) {} }
    async function manualSync() { 
        try {
            const r = await fetch(CLOUD_URL + '?t=' + Date.now());
            const d = await r.json();
            if (d.states) { states = d.states; notes = d.notes || {}; render(); alert("Данные из облака загружены"); }
        } catch(e) { alert("Ошибка связи с облаком"); }
    }
</script>
</body>
</html>
