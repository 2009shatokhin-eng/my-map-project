<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BANZAI YANDEX GPS PRO</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=50b1a67c-b3e5-433f-a378-4f8ff228e7d7&lang=ru_RU" type="text/javascript"></script>
    <style>
        :root { --panel-h: 70px; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { width: 100vw; height: calc(100vh - var(--panel-h)); position: absolute; top: var(--panel-h); }
        .ui-panel { height: var(--panel-h); display: grid; grid-template-columns: 1.2fr 1fr 1fr 0.6fr; gap: 8px; padding: 10px; background: #111; box-sizing: border-box; }
        button { height: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .active-mode { background: #005cc5 !important; border-color: #fff; }
        .bad-gps { background: #b58900 !important; } /* Цвет для плохой точности */
        .balloon-content { color: #000; padding: 5px; font-size: 14px; }
        .balloon-content button { background: #007bff; color: #fff; margin-top: 10px; width: 100%; height: 40px; }
    </style>
</head>
<body>

<div class="ui-panel">
    <button id="gpsBtn" onclick="toggleGPS()">🛰 GPS: ВЫКЛ</button>
    <button id="tmrBtn" onclick="toggleTomorrow()">ЗАВТРА</button>
    <button onclick="manualSync()">СИНХРО</button>
    <button onclick="location.reload()">🔄</button>
</div>

<div id="map"></div>

<script>
    // URL вашего Google Apps Script
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycby5P8fV0N9L-qJ7B6E4qK9pWp_XvLz0S0uYf_Z4z7Yf_Z4z7Yf_Z4z7Yf/exec';
    
    const SCHED = {
        work: [3, 4, 8, 13, 16, 18, 19, 21, 23, 28, 29],
        sat: [3, 4, 5, 6, 8, 13, 14, 16, 18, 19, 21, 22, 23, 28, 29]
    };

    const points = [
        ["V", 1, 57.153616, 60.012377], ["V", 3, 57.153763, 60.011196], ["V", 4, 57.153835, 60.011082],
        ["V", 13, 57.153791, 60.011370], ["V", 16, 57.153733, 60.011409], ["V", 17, 57.153738, 60.011488],
        ["V", 18, 57.153766, 60.011531], ["V", 19, 57.153796, 60.011565], ["V", 20, 57.153823, 60.011603],
        ["V", 21, 57.153851, 60.011648], ["V", 22, 57.153878, 60.011690], ["V", 23, 57.153913, 60.011740],
        ["V", 28, 57.154030, 60.011915], ["V", 29, 57.154070, 60.011977], ["S", 1, 57.153089, 60.005272],
        ["S", 2, 57.153205, 60.005423], ["S", 3, 57.153315, 60.005572], ["S", 4, 57.153434, 60.005727],
        ["S", 5, 57.153549, 60.005882], ["S", 15, 57.153479, 60.011342], ["S", 21, 57.153648, 60.011568],
        ["S", 25, 57.153748, 60.011718], ["S", 29, 57.153856, 60.011874], ["S", 30, 57.153883, 60.011915],
        ["S", 31, 57.153911, 60.011956], ["S", 32, 57.153935, 60.011993]
    ];

    let myMap, watchId, myPosMarker;
    let isTomorrow = false;
    let states = JSON.parse(localStorage.getItem('banzai_s') || '{}');

    ymaps.ready(() => {
        myMap = new ymaps.Map("map", {
            center: [57.1537, 60.0115],
            zoom: 19,
            type: 'yandex#hybrid',
            controls: ['zoomControl', 'typeSelector', 'geolocationControl']
        });
        render();
    });

    function render() {
        myMap.geoObjects.removeAll();
        if (myPosMarker) myMap.geoObjects.add(myPosMarker);

        document.getElementById('tmrBtn').className = isTomorrow ? 'active-mode' : '';

        const now = new Date();
        if (isTomorrow) now.setDate(now.getDate() + 1);
        const day = now.getDay();
        const currentSched = (day === 6) ? SCHED.sat : SCHED.work;

        points.forEach(p => {
            const id = p[0] + p[1];
            const isInSched = currentSched.includes(p[1]) && p[0] === 'V';
            const isDone = states[id] === 1;

            let color = "#777"; 
            if (isInSched) color = "#007bff"; 
            if (isDone) color = "#28a745";    

            const placemark = new ymaps.Placemark([p[2], p[3]], {
                balloonContent: `
                    <div class="balloon-content">
                        <b>Точка: ${id}</b><br>
                        ${isInSched ? '<i>(В плане на сегодня)</i>' : ''}
                        <button onclick="togglePoint('${id}')">
                            ${isDone ? 'СБРОСИТЬ' : 'ОТМЕТИТЬ ГОТОВЫМ'}
                        </button>
                    </div>`
            }, {
                preset: 'islands#dotIcon',
                iconColor: color,
                draggable: true 
            });

            placemark.events.add('dragend', function(e) {
                const newCoords = placemark.geometry.getCoordinates();
                console.log(`Новые координаты для ${id}:`, newCoords[0].toFixed(6), newCoords[1].toFixed(6));
            });

            myMap.geoObjects.add(placemark);
        });
    }

    function togglePoint(id) {
        states[id] = states[id] === 1 ? 0 : 1;
        localStorage.setItem('banzai_s', JSON.stringify(states));
        render();
        sendToCloud();
    }

    function toggleTomorrow() { isTomorrow = !isTomorrow; render(); }

    function toggleGPS() {
        const btn = document.getElementById('gpsBtn');
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            btn.innerText = "🛰 GPS: ВЫКЛ";
            btn.classList.remove('active-mode', 'bad-gps');
            if (myPosMarker) myMap.geoObjects.remove(myPosMarker);
        } else {
            btn.classList.add('active-mode');
            
            // ГЕОЛОКАЦИЯ С УЛУЧШЕННЫМИ НАСТРОЙКАМИ
            watchId = navigator.geolocation.watchPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                const accuracy = Math.round(pos.coords.accuracy);
                
                btn.innerText = `🛰 ${accuracy}м`;
                
                // Визуальное предупреждение, если точность плохая (больше 25 метров)
                if (accuracy > 25) {
                    btn.classList.add('bad-gps');
                } else {
                    btn.classList.remove('bad-gps');
                }

                if (!myPosMarker) {
                    myPosMarker = new ymaps.Placemark(c, {}, {
                        preset: 'islands#personIcon', 
                        iconColor: '#ff0000',
                        zIndex: 1000
                    });
                    myMap.geoObjects.add(myPosMarker);
                } else {
                    myPosMarker.geometry.setCoordinates(c);
                }

                // Центрируем карту только если точность выше 20 метров, чтобы не "болтало"
                if (accuracy < 20) {
                    myMap.setCenter(c);
                }
            }, (err) => {
                alert("Ошибка GPS: " + err.message);
                toggleGPS(); // Выключаем при ошибке
            }, {
                enableHighAccuracy: true, // ПРИНУДИТЕЛЬНЫЙ GPS
                maximumAge: 0,            // БЕЗ КЭША
                timeout: 10000            // ЖДАТЬ 10 СЕКУНД
            });
        }
    }

    async function sendToCloud() { 
        try { 
            fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({states}) }); 
        } catch(e) { console.error("Cloud Error", e); } 
    }

    async function manualSync() { 
        try {
            const r = await fetch(CLOUD_URL + '?t=' + Date.now());
            const d = await r.json();
            if (d.states) { 
                states = d.states; 
                localStorage.setItem('banzai_s', JSON.stringify(states)); 
                render(); 
                alert("Синхронизация успешна");
            }
        } catch(e) { 
            alert("Ошибка связи с облаком"); 
        }
    }
</script>
</body>
</html>
